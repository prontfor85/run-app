<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>러닝앱 프로토타입</title>
<link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
<style>
  :root{ --brand:#ff5a3c; --brand2:#ff8a3c; --ink:#1a1d23; --sub:#7a818d;
    --bg:#f5f6f8; --card:#fff; --line:#e9ebef; --ok:#16a34a; --warn:#dc2626; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:#22252b;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;}
  #phone{position:relative;max-width:430px;margin:0 auto;height:100vh;height:100dvh;
    background:var(--bg);overflow:hidden;display:flex;flex-direction:column;}
  #view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 18px 90px;}
  #view.maptab{padding:0;overflow:hidden;position:relative;}
  h1{font-size:22px;margin:6px 0 16px;}
  .sub{color:var(--sub);font-size:13px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;}
  .row{display:flex;justify-content:space-between;align-items:center;}
  .muted{color:var(--sub);font-size:12px;}
  .big{font-size:28px;font-weight:800;}
  .brand{color:var(--brand);}
  button{font-family:inherit;cursor:pointer;border:none;}
  .btn{background:var(--brand);color:#fff;border-radius:14px;padding:14px;width:100%;
    font-size:15px;font-weight:700;}
  .btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line);}
  .btn.sm{padding:9px 14px;width:auto;border-radius:10px;font-size:13px;}
  .chip{display:inline-block;padding:8px 12px;border-radius:10px;border:1px solid var(--line);
    background:var(--card);font-size:13px;margin:0 6px 6px 0;}
  .chip.on{background:#fff0ec;border-color:var(--brand);color:var(--brand);font-weight:700;}
  .bar{height:9px;border-radius:5px;background:#eef1f5;overflow:hidden;margin-top:6px;}
  .bar > i{display:block;height:100%;border-radius:5px;background:var(--brand);}
  /* 탭바 */
  #tabs{position:absolute;left:0;right:0;bottom:0;height:74px;background:var(--card);
    border-top:1px solid var(--line);display:flex;align-items:flex-start;padding-top:8px;}
  .tab{flex:1;text-align:center;color:var(--sub);font-size:10px;background:none;}
  .tab .ic{font-size:19px;display:block;line-height:1.3;}
  .tab.on{color:var(--brand);font-weight:700;}
  /* 오버레이 */
  .overlay{position:absolute;inset:0;background:var(--bg);z-index:1000;display:flex;flex-direction:column;
    padding:22px 18px;overflow-y:auto;}
  .overlay.dark{background:#16181d;color:#fff;}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .startbtn{width:180px;height:180px;border-radius:50%;background:var(--brand);color:#fff;
    font-size:30px;font-weight:800;box-shadow:0 10px 30px rgba(255,90,60,.45);}
  .live{font-size:13px;color:var(--sub);}
  .stat-lg{font-size:56px;font-weight:800;line-height:1;}
  .metrics{display:flex;width:100%;gap:10px;margin:20px 0;}
  .metric{flex:1;text-align:center;}
  .metric .v{font-size:24px;font-weight:800;}
  .metric .l{font-size:11px;color:var(--sub);margin-top:2px;}
  .hr{color:#e0245e;}
  .checker{background-image:
      linear-gradient(45deg,#3a3d44 25%,transparent 25%),
      linear-gradient(-45deg,#3a3d44 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#3a3d44 75%),
      linear-gradient(-45deg,transparent 75%,#3a3d44 75%);
    background-size:20px 20px;background-position:0 0,0 10px,10px -10px,-10px 0;background-color:#2a2c31;}
  .styletab{display:inline-block;padding:8px 12px;border-radius:10px;border:1px solid var(--line);
    background:var(--card);font-size:12px;margin:0 6px 6px 0;}
  .styletab.on{background:#fff0ec;border-color:var(--brand);color:var(--brand);font-weight:700;}
  .topbar{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .topbar .x{font-size:22px;color:var(--sub);background:none;}
  .shoe-emoji{font-size:26px;margin-right:8px;}
  .seg{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
  .seg button{flex:1;padding:9px;background:var(--card);font-size:13px;color:var(--sub);}
  .seg button.on{background:var(--brand);color:#fff;font-weight:700;}
  .note{font-size:11px;color:var(--sub);background:#eef6ff;border:1px solid #cfe2ff;color:#1e40af;
    border-radius:10px;padding:10px;margin-top:10px;}
  /* ---- 인터랙션/피드백 ---- */
  button{transition:transform .08s ease, opacity .15s ease, background .15s ease;}
  button:active{transform:scale(.94);}
  .card{transition:transform .08s ease, box-shadow .15s ease;}
  .card[onclick]{cursor:pointer;}
  .card[onclick]:active{transform:scale(.985);}
  .btn:active{filter:brightness(.95);}
  /* 탭 전환 페이드 */
  @keyframes viewIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  #view > *{animation:viewIn .22s ease;}
  #view.maptab > *{animation:none;}
  /* 오버레이 슬라이드업 */
  @keyframes ovIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  .overlay{animation:ovIn .24s cubic-bezier(.2,.7,.3,1);}
  /* 토스트 */
  #toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(10px);
    background:#1a1d23;color:#fff;font-size:13px;font-weight:600;padding:11px 18px;border-radius:999px;
    box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;z-index:2000;transition:opacity .2s,transform .2s;white-space:nowrap;max-width:88%;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  /* 빈 상태 */
  .empty{text-align:center;color:var(--sub);padding:54px 20px;}
  .empty .ic{font-size:46px;}
  .empty .t{font-size:15px;font-weight:700;color:var(--ink);margin-top:12px;}
  .empty .d{font-size:13px;margin-top:6px;line-height:1.6;}
  /* 측정 중 REC 표시 */
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}
  .rec-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#e0245e;margin-right:7px;animation:pulse 1.1s infinite;vertical-align:middle;}
  @keyframes sheetUp{from{transform:translateY(120%);opacity:.4;}to{transform:translateY(0);opacity:1;}}
  .recsheet{animation:sheetUp .3s cubic-bezier(.2,.7,.3,1);}
  /* ---- 다크 테마 ---- */
  body.theme-dark{--bg:#15171b;--card:#1e2127;--ink:#f1f2f4;--sub:#9aa0ab;--line:#2c3037;}
  input,select{background:var(--card);color:var(--ink);}
  /* 토글 스위치 */
  .sw{width:46px;height:26px;border-radius:13px;position:relative;flex:none;transition:background .15s;}
  .sw > i{position:absolute;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
</style>
</head>
<body>
<div id="phone">
  <div id="view"></div>
  <div id="tabs"></div>
  <div id="toast"></div>
</div>
<canvas id="cv" width="600" height="800" style="display:none"></canvas>

<script>
//==================== 지도 설정 (여기를 직접 수정하세요) ====================
// 현재: OpenFreeMap 'Liberty' 스타일 (무료 · 상업용 가능 · API 키 불필요).
// 다른 스타일로 바꾸려면 아래 MAP_STYLE 의 URL만 교체하세요.
//   · OpenFreeMap: https://tiles.openfreemap.org/styles/{liberty|positron|bright|dark|fiord}
//   · VersaTiles : https://tiles.versatiles.org/assets/styles/{colorful|shadow|neutrino|graybeard|eclipse}/style.json
//   · Mapbox/MapTiler 등 키가 필요한 스타일도 style JSON URL이면 사용 가능
//     (그 경우 키 노출·과금 주의: 대시보드에서 URL 제한 설정, 키는 외부에 공유 금지)
const MAP_STYLE = 'https://tiles.openfreemap.org/styles/liberty';

//==================== 상태/저장 ====================
const KEY='runapp_proto_v1';
const DEFAULT={
  unit:'km', goal:20, activeTab:'home', defaultShoe:1, user:null,
  theme:'light', notif:{goal:true,shoe:true,push:false},
  privacy:{hideEnds:true,visibility:'private'}, profile:{nickname:'',height:'',weight:''},
  runGoal:{type:'none',value:0}, autopause:false, statPeriod:'week',
  shoes:[
    {id:1,name:'나이키 페가수스 40',km:412,count:78,max:600},
    {id:2,name:'아식스 카야노 31',km:735,count:121,max:800},
    {id:3,name:'호카 클리프톤 9',km:120,count:22,max:600},
  ],
  runs:[
    {id:1,date:'2026-05-28',dist:5.32,dur:1694,hr:152,cal:312,shoeId:1},
    {id:2,date:'2026-05-26',dist:4.70,dur:1640,hr:148,cal:276,shoeId:1},
    {id:3,date:'2026-05-23',dist:8.10,dur:2730,hr:159,cal:475,shoeId:2},
  ],
};
let S;
function load(){ let saved=null; try{ saved=JSON.parse(localStorage.getItem(KEY)); }catch(e){}
  S=Object.assign(structuredClone(DEFAULT), saved||{});
  // 누락된 중첩 설정 보강
  S.notif=Object.assign({goal:true,shoe:true,push:false}, S.notif||{});
  S.privacy=Object.assign({hideEnds:true,visibility:'private'}, S.privacy||{});
  S.profile=Object.assign({nickname:'',height:'',weight:''}, S.profile||{});
  S.runGoal=Object.assign({type:'none',value:0}, S.runGoal||{});
}
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(S)); }catch(e){} }
load();

//==================== 유틸 ====================
const $=s=>document.querySelector(s);
const view=()=>$('#view');
let _toastT=null;
function toast(msg){ const t=$('#toast'); if(!t)return; t.textContent=msg; t.classList.add('show');
  clearTimeout(_toastT); _toastT=setTimeout(()=>t.classList.remove('show'),2200); }
function applyTheme(){ const m=S.theme||'light';
  const dark = m==='dark' || (m==='system' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.body.classList.toggle('theme-dark', dark); }
function fmtDur(sec){sec=Math.round(sec);const m=Math.floor(sec/60),s=sec%60;
  const h=Math.floor(m/60);
  if(h>0)return `${h}:${String(m%60).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;}
function pace(dist,dur){ if(dist<=0)return "--'--\"";
  const p=dur/dist; const m=Math.floor(p/60), s=Math.round(p%60);
  return `${m}'${String(s).padStart(2,'0')}"`;}
function weekKm(){ const now=new Date('2026-05-30'); const wkAgo=new Date(now); wkAgo.setDate(now.getDate()-6);
  return S.runs.filter(r=>new Date(r.date)>=wkAgo).reduce((a,r)=>a+r.dist,0);}
function weekCount(){ const now=new Date('2026-05-30'); const wkAgo=new Date(now); wkAgo.setDate(now.getDate()-6);
  return S.runs.filter(r=>new Date(r.date)>=wkAgo).length;}
function shoe(id){return S.shoes.find(s=>s.id===id);}
function fmtDate(d){const dt=new Date(d);return `${dt.getMonth()+1}월 ${dt.getDate()}일`;}

//==================== 탭바 ====================
const TABS=[['home','🏠','홈'],['log','📋','활동'],['run','🏃','기록'],['shoe','👟','신발'],['my','👤','마이']];
function renderTabs(){
  $('#tabs').innerHTML=TABS.map(([k,ic,lb])=>{
    const on=S.activeTab===k;
    return `<button class="tab ${on?'on':''}" onclick="go('${k}')">
      <span class="ic">${ic}</span><span class="lbl">${lb}</span></button>`;}).join('');
}
function go(tab){ if(tab==='run'){ if(document.getElementById('ovRun')) reopenRun(); else openRecord(); return; } S.activeTab=tab; save(); render(); }

//==================== 화면 렌더 ====================
function render(){
  applyTheme();
  renderTabs();
  let t=S.activeTab;
  if(t==='run'){ t='home'; S.activeTab='home'; }   // 기록은 탭이 아니라 모달
  view().classList.toggle('maptab', false);
  if(t==='log') return renderLog();
  if(t==='shoe') return renderShoe();
  if(t==='my') return renderMy();
  return renderHome();
}

function mapSVG(){
  return `<svg viewBox="0 0 400 760" preserveAspectRatio="xMidYMid slice" style="position:absolute;inset:0;width:100%;height:100%">
    <rect width="400" height="760" fill="#e9eef2"/>
    <!-- 강 -->
    <path d="M-20 600 L150 470 L230 520 L160 760 L-20 760 Z" fill="#bcdcee"/>
    <path d="M-20 660 L120 560 L180 600 L120 760 L-20 760 Z" fill="#a9d2ea"/>
    <!-- 공원 -->
    <ellipse cx="330" cy="120" rx="90" ry="70" fill="#d6e9cf"/>
    <ellipse cx="60" cy="240" rx="55" ry="45" fill="#d6e9cf"/>
    <ellipse cx="350" cy="560" rx="70" ry="60" fill="#d6e9cf"/>
    <!-- 블록 -->
    ${[...Array(7)].map((_,r)=>[...Array(5)].map((_,c)=>`<rect x="${20+c*78}" y="${40+r*98}" width="58" height="74" rx="5" fill="#f4f6f8"/>`).join('')).join('')}
    <!-- 도로(굵은) -->
    <g stroke="#ffffff" stroke-linecap="round" fill="none">
      <path d="M10 150 L400 110" stroke-width="15"/>
      <path d="M10 360 L400 320" stroke-width="15"/>
      <path d="M60 20 L210 760" stroke-width="15"/>
      <path d="M250 0 L360 760" stroke-width="13"/>
      <path d="M-10 540 L400 470" stroke-width="13"/>
    </g>
    <!-- 도로(얇은) -->
    <g stroke="#ffffff" stroke-width="6" fill="none" opacity="0.9">
      <path d="M10 250 L400 215"/><path d="M10 450 L400 415"/><path d="M150 20 L260 760"/>
      <path d="M10 640 L400 600"/>
    </g>
    <!-- POI -->
    <circle cx="285" cy="395" r="12" fill="#e0245e"/><text x="285" y="400" font-size="13" text-anchor="middle">🛒</text>
    <circle cx="165" cy="410" r="12" fill="#c2410c"/>
    <!-- 현위치 -->
    <circle cx="200" cy="350" r="34" fill="#2f6df6" opacity="0.15"/>
    <circle cx="200" cy="350" r="11" fill="#2f6df6" stroke="#fff" stroke-width="3"/>
  </svg>`;
}
let _runMap=null;
function setupRunMap(){
  if(_runMap){ try{_runMap.remove();}catch(e){} _runMap=null; }
  const el=document.getElementById('runmap'); if(!el||typeof maplibregl==='undefined')return;
  const map=new maplibregl.Map({container:'runmap',style:MAP_STYLE,center:[126.901,37.556],zoom:14,attributionControl:true});
  map.addControl(new maplibregl.NavigationControl({showCompass:false}),'top-right');
  _runMap=map;
  const pill=()=>document.getElementById('gpsPill');
  map.on('load',()=>{ try{map.resize();}catch(e){}
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(p=>{
        const ll=[p.coords.longitude,p.coords.latitude]; map.flyTo({center:ll,zoom:16});
        const dot=document.createElement('div');
        dot.style.cssText='width:18px;height:18px;border-radius:50%;background:#2f6df6;border:3px solid #fff;box-shadow:0 0 0 5px rgba(47,109,246,.22)';
        new maplibregl.Marker({element:dot}).setLngLat(ll).addTo(map);
        const q=pill(); if(q){q.style.color='var(--ok)';q.innerHTML='● 현재 위치';}
      },()=>{ const q=pill(); if(q){q.style.color='#b45309';q.innerHTML='⚠ 위치 권한 없음 — 기본 지도';}
      },{enableHighAccuracy:true,timeout:8000});
    } else { const q=pill(); if(q){q.style.color='#b45309';q.innerHTML='⚠ 위치 미지원 — 기본 지도';} }
  });
  setTimeout(()=>{ try{map.resize();}catch(e){} },300);
}
// 기록(측정 시작)은 하단 네비를 덮는 전체화면 모달
let _recCollapsed=false;
function recSheetHTML(){
  const ds=shoe(S.defaultShoe);
  if(_recCollapsed){
    return `<div onclick="toggleRecSheet()" style="width:44px;height:5px;border-radius:3px;background:var(--line);margin:0 auto 10px;cursor:pointer"></div>
      <div onclick="toggleRecSheet()" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer">
        <span style="font-weight:700">러닝 <span class="muted" style="font-size:12px;font-weight:400">· 탭하여 펼치기</span></span>
        <button class="startbtn" style="width:48px;height:48px;font-size:20px" onclick="event.stopPropagation();startFromRecord()">▶</button></div>`;
  }
  return `<div onclick="toggleRecSheet()" style="width:44px;height:5px;border-radius:3px;background:var(--line);margin:0 auto 12px;cursor:pointer"></div>
    <div style="text-align:center;font-weight:700;margin-bottom:12px">러닝</div>
    <div style="display:flex;margin-bottom:14px">
      <div style="flex:1;text-align:center"><div style="font-size:23px;font-weight:800">00:00</div><div class="muted">시간</div></div>
      <div style="flex:1;text-align:center"><div style="font-size:23px;font-weight:800">--'--"</div><div class="muted">평균 페이스</div></div>
      <div style="flex:1;text-align:center"><div style="font-size:23px;font-weight:800">0.00</div><div class="muted">거리(km)</div></div>
    </div>
    <div style="display:flex;align-items:center;justify-content:center;gap:36px">
      <div style="text-align:center;width:72px" onclick="openShoePicker()">
        <button style="width:54px;height:54px;border-radius:50%;background:var(--bg);box-shadow:0 2px 8px rgba(0,0,0,.12);font-size:22px">👟</button>
        <div style="font-size:10px;color:var(--sub);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ds?ds.name:'신발 선택'}</div></div>
      <div style="text-align:center">
        <button class="startbtn" style="width:80px;height:80px;font-size:30px" onclick="startFromRecord()">▶</button>
        <div style="font-size:12px;color:var(--brand);font-weight:700;margin-top:6px">START</div></div>
      <div style="text-align:center;width:72px" onclick="openGoalSheet()">
        <button style="width:54px;height:54px;border-radius:50%;background:var(--bg);box-shadow:0 2px 8px rgba(0,0,0,.12);font-size:22px">⚙️</button>
        <div style="font-size:10px;color:var(--sub);margin-top:4px">설정</div></div>
    </div>`;
}
function openRecord(){
  if(document.getElementById('ovRecord'))return;
  _recCollapsed=false;
  const hasMap=(typeof maplibregl!=='undefined');
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='ovRecord'; ov.style.padding='0';
  ov.innerHTML=`
    <div style="position:absolute;inset:0;overflow:hidden">
      ${hasMap?'<div id="runmap" style="position:absolute;inset:0;z-index:0;background:#e9eef2"></div>':mapSVG()}
      <div id="gpsPill" style="position:absolute;top:16px;left:50%;transform:translateX(-50%);background:#fff;border-radius:999px;
        padding:8px 16px;box-shadow:0 3px 10px rgba(0,0,0,.12);font-size:12px;color:var(--ok);white-space:nowrap;z-index:500">${hasMap?'● 위치 확인 중…':'● GPS 연결됨 (시뮬레이션)'}</div>
      <button onclick="closeRecord()" title="닫기" style="position:absolute;left:16px;top:16px;z-index:600;width:40px;height:40px;border-radius:50%;background:#fff;color:#1a1d23;box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:16px">▾</button>
      <div id="recSheet" class="recsheet" style="position:absolute;left:0;right:0;bottom:0;z-index:500;background:var(--card);border-radius:22px 22px 0 0;box-shadow:0 -6px 24px rgba(0,0,0,.16);padding:8px 16px 26px">${recSheetHTML()}</div>
    </div>`;
  $('#phone').appendChild(ov);
  if(hasMap) setTimeout(setupRunMap,0);
}
function toggleRecSheet(){ _recCollapsed=!_recCollapsed; const s=document.getElementById('recSheet'); if(s)s.innerHTML=recSheetHTML(); }
function closeRecord(){ const ov=document.getElementById('ovRecord'); if(ov)ov.remove(); if(_runMap){try{_runMap.remove();}catch(e){}_runMap=null;} }
function startFromRecord(){ closeRecord(); startRun(); }

function statBuckets(period){
  const today=new Date('2026-05-30'), runs=S.runs, b=[];
  if(period==='week'){ const dn=['일','월','화','수','목','금','토'];
    for(let i=6;i>=0;i--){ const d=new Date(today); d.setDate(today.getDate()-i);
      const km=runs.filter(r=>new Date(r.date).toDateString()===d.toDateString()).reduce((a,r)=>a+r.dist,0);
      b.push({label:dn[d.getDay()],km}); } }
  else if(period==='month'){ for(let w=3;w>=0;w--){ const end=new Date(today); end.setDate(today.getDate()-w*7);
      const start=new Date(end); start.setDate(end.getDate()-6);
      const km=runs.filter(r=>{const rd=new Date(r.date);return rd>=start&&rd<=end;}).reduce((a,r)=>a+r.dist,0);
      b.push({label:w===0?'이번주':w+'주전',km}); } }
  else { for(let m=5;m>=0;m--){ const d=new Date(today.getFullYear(),today.getMonth()-m,1);
      const km=runs.filter(r=>{const rd=new Date(r.date);return rd.getFullYear()===d.getFullYear()&&rd.getMonth()===d.getMonth();}).reduce((a,r)=>a+r.dist,0);
      b.push({label:(d.getMonth()+1)+'월',km}); } }
  return b;
}
function barChart(bk){ const max=Math.max(0.1,...bk.map(x=>x.km)),W=300,H=126,n=bk.length,bw=W/n;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">`+bk.map((b,i)=>{
    const h=Math.max(2,b.km/max*(H-30)),x=i*bw+bw*0.2,y=H-20-h,w=bw*0.6;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" rx="3" fill="${b.km>0?'#ff5a3c':'#cfd3da'}"/>
      <text x="${(x+w/2).toFixed(1)}" y="${H-5}" font-size="10" fill="#9aa0ab" text-anchor="middle">${b.label}</text>
      ${b.km>0?`<text x="${(x+w/2).toFixed(1)}" y="${(y-4).toFixed(1)}" font-size="9" fill="#ff5a3c" text-anchor="middle" font-weight="700">${b.km.toFixed(1)}</text>`:''}`;
  }).join('')+`</svg>`; }
function prData(){ const runs=S.runs; if(!runs.length)return null;
  const best=Math.min(...runs.filter(r=>r.dist>=1).map(r=>r.dur/r.dist));
  return {longest:Math.max(...runs.map(r=>r.dist)),total:runs.reduce((a,r)=>a+r.dist,0),
    count:runs.length,bestPace:isFinite(best)?best:0}; }
function badges(){ const runs=S.runs,total=runs.reduce((a,r)=>a+r.dist,0);
  return [{ic:'🎽',label:'첫 러닝',ok:runs.length>=1},{ic:'5️⃣',label:'5K 완주',ok:runs.some(r=>r.dist>=5)},

    {ic:'🏅',label:'누적 50km',ok:total>=50},{ic:'💯',label:'누적 100km',ok:total>=100}]; }
function setStat(p){ S.statPeriod=p; save(); render(); }

    <button class="btn" style="margin-top:16px" onclick="saveProfile()">저장</button>
    <div class="note" style="margin-top:12px">키·몸무게는 칼로리 추정 정확도를 높이는 데만 쓰여요. 이 기기 안에만 저장되고 외부로 전송되지 않습니다.</div></div>`;
  $('#phone').appendChild(ov);
}
function saveProfile(){ const g=id=>document.getElementById(id);
  S.profile={ nickname:(g('pfName').value||'').trim(), height:(g('pfH').value||'').trim(), weight:(g('pfW').value||'').trim() };
  save(); const ov=$('#ovProfile'); if(ov)ov.remove(); render(); toast('프로필을 저장했어요'); }

//==================== 러닝 측정(시뮬레이션) ====================
let RUN=null, timer=null, _liveMap=null, _liveMarker=null;
function startRun(){ // 3·2·1 카운트다운 후 시작
  const ov=document.createElement('div'); ov.className='overlay dark'; ov.id='ovCount';
  ov.style.alignItems='center'; ov.style.justifyContent='center'; ov.style.zIndex='1500';
  ov.innerHTML=`<div id="cdNum" style="font-size:150px;font-weight:800;color:#fff;line-height:1">3</div>`;
  $('#phone').appendChild(ov);
  let n=3; const num=()=>document.getElementById('cdNum');
  const iv=setInterval(()=>{ n--;
    if(n>0){ const e=num(); if(e)e.textContent=n; }
    else if(n===0){ const e=num(); if(e){e.textContent='출발!';e.style.fontSize='96px';} }
    else { clearInterval(iv); const o=document.getElementById('ovCount'); if(o)o.remove(); beginRun(); }
  },800);
}
function beginRun(){
  RUN={t0:Date.now(),elapsed:0,dist:0,hr:120,paused:false,pace:330,cal:0,laps:[],
       base:[126.901,37.556],dir:Math.random()*Math.PI*2,geo:[[126.901,37.556]],
       goal:JSON.parse(JSON.stringify(S.runGoal||{type:'none'})), goalReached:false, autopause:!!S.autopause, view:'full'};
  renderRunning();
  if(navigator.geolocation) navigator.geolocation.getCurrentPosition(p=>{ if(!RUN)return;
    const b=[p.coords.longitude,p.coords.latitude]; RUN.base=b; if(RUN.geo.length<=1)RUN.geo=[b.slice()];
    if(_liveMap){try{_liveMap.setCenter(b); if(_liveMarker)_liveMarker.setLngLat(b);}catch(e){}} },()=>{},{enableHighAccuracy:true,timeout:6000});
  timer=setInterval(tick,1000);
}
function tick(){
  if(RUN.paused)return;
  RUN.elapsed++;
  // 페이스 랜덤워크 (초/ km), 4'40"~6'10"
  RUN.pace+=(Math.random()-0.5)*8; RUN.pace=Math.max(280,Math.min(370,RUN.pace));
  RUN.dist+=1/RUN.pace; // km
  // 심박 랜덤워크 (워밍업→상승)
  const target=140+Math.min(28,RUN.elapsed/30);
  RUN.hr+=(target-RUN.hr)*0.08+(Math.random()-0.5)*3; RUN.hr=Math.max(95,Math.min(186,RUN.hr));
  RUN.cal=RUN.dist*58;
  // 지리 경로(라이브)
  RUN.dir+=(Math.random()-0.5)*0.8;
  const last=RUN.geo[RUN.geo.length-1];
  const dKm=1/RUN.pace;
  const lat=last[1]+(dKm/111)*Math.cos(RUN.dir);
  const lng=last[0]+(dKm/(111*Math.cos(last[1]*Math.PI/180)))*Math.sin(RUN.dir);
  RUN.geo.push([+lng.toFixed(6),+lat.toFixed(6)]);
  checkGoal();
  updateRunning();
}
function checkGoal(){ const g=RUN.goal; if(!g||g.type==='none'||RUN.goalReached)return;
  let done=false;
  if(g.type==='distance') done=RUN.dist>=g.value;
  else if(g.type==='time') done=RUN.elapsed>=g.value;
  if(done){ RUN.goalReached=true; toast('목표 달성! 🎉'); } }
function goalLabel(g){ if(!g||g.type==='none')return '목표 없음';
  if(g.type==='distance')return `목표 ${(+g.value).toFixed(1)}km`;
  if(g.type==='time')return `목표 ${Math.round(g.value/60)}분`;
  if(g.type==='pace')return `목표 페이스 ${paceFromSec(g.value)}/km`;
  return '목표 없음'; }
function openGoalSheet(){
  const old=document.getElementById('ovGoal'); if(old)old.remove();
  const g=S.runGoal;
  const seg=(t,l)=>`<button class="${g.type===t?'on':''}" onclick="setGoalType('${t}')">${l}</button>`;
  let valHtml='';
  if(g.type==='distance') valHtml=`<div class="muted" style="font-size:12px;margin:14px 0 4px">목표 거리 (km)</div>
    <input type="number" inputmode="decimal" value="${g.value||5}" onchange="S.runGoal.value=Math.max(0.1,+this.value||5);save()" style="width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:15px">`;
  else if(g.type==='time') valHtml=`<div class="muted" style="font-size:12px;margin:14px 0 4px">목표 시간 (분)</div>
    <input type="number" inputmode="numeric" value="${Math.round((g.value||1800)/60)}" onchange="S.runGoal.value=Math.max(1,(+this.value||30))*60;save()" style="width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:15px">`;
  else if(g.type==='pace') valHtml=`<div class="muted" style="font-size:12px;margin:14px 0 4px">목표 페이스 (분:초 /km)</div>
    <input type="text" value="${paceFromSec(g.value||330).replace(/['\"]/g,m=>m==="'"?':':'')}" placeholder="5:30" onchange="S.runGoal.value=parsePace(this.value);save()" style="width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:15px">`;
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='ovGoal'; ov.style.padding='0';
  ov.innerHTML=`<div style="background:var(--card);border-radius:20px 20px 0 0;padding:18px 16px 24px;margin-top:auto">
    <div class="row" style="margin-bottom:14px"><b>러닝 설정</b><button class="x" onclick="document.getElementById('ovGoal').remove()">✕</button></div>
    <div class="muted" style="font-size:12px;margin-bottom:6px">목표</div>
    <div class="seg">${seg('none','없음')}${seg('distance','거리')}${seg('time','시간')}${seg('pace','페이스')}</div>
    ${valHtml}
    <div class="card" style="margin-top:16px"><div class="row"><span style="flex:1">자동 일시정지 <span class="muted" style="font-size:11px">(멈추면 자동 정지)</span></span>${switchBtn(S.autopause,'toggleAutopause()')}</div></div>
    <button class="btn" style="margin-top:6px" onclick="applyGoal()">적용</button></div>`;
  $('#phone').appendChild(ov);
}
function setGoalType(t){ S.runGoal.type=t;
  if(t==='distance'&&!(S.runGoal.value>0&&S.runGoal.value<100)) S.runGoal.value=5;
  if(t==='time') S.runGoal.value=1800;
  if(t==='pace') S.runGoal.value=330;
  save(); openGoalSheet(); }
function parsePace(str){ const m=String(str).split(/[:'\"]/).map(x=>parseInt(x,10)); const sec=(m[0]||5)*60+(m[1]||0); return Math.max(120,Math.min(900,sec)); }
function toggleAutopause(){ S.autopause=!S.autopause; save(); openGoalSheet(); }
function applyGoal(){ const ov=$('#ovGoal'); if(ov)ov.remove(); render(); toast(S.runGoal.type==='none'?'목표 해제':goalLabel(S.runGoal)+' 설정'); }
function lineFeature(coords){return {type:'Feature',geometry:{type:'LineString',coordinates:coords}};}
function svgFromGeo(g){ if(g.length<2)return ''; const xs=g.map(p=>p[0]),ys=g.map(p=>p[1]);
  const minx=Math.min(...xs),maxx=Math.max(...xs),miny=Math.min(...ys),maxy=Math.max(...ys);
  const w=(maxx-minx)||1e-6,h=(maxy-miny)||1e-6,sc=Math.min(330/w,660/h),ox=20+(330-w*sc)/2,oy=20+(660-h*sc)/2;
  return 'M'+g.map(p=>`${(ox+(p[0]-minx)*sc).toFixed(1)} ${(oy+(maxy-p[1])*sc).toFixed(1)}`).join(' L'); }
function setupLiveMap(){
  if(typeof maplibregl==='undefined')return;
  try{ _liveMap=new maplibregl.Map({container:'runLiveMap',style:MAP_STYLE,center:RUN.base,zoom:16,interactive:false,attributionControl:false}); }catch(e){ return; }
  _liveMap.on('load',()=>{ try{
    _liveMap.addSource('live',{type:'geojson',data:lineFeature(RUN.geo)});
    _liveMap.addLayer({id:'liveln',type:'line',source:'live',layout:{'line-cap':'round','line-join':'round'},paint:{'line-color':'#ff5a3c','line-width':5}});
    const dot=document.createElement('div'); dot.style.cssText='width:16px;height:16px;border-radius:50%;background:#2f6df6;border:3px solid #fff;box-shadow:0 0 0 5px rgba(47,109,246,.25)';
    _liveMarker=new maplibregl.Marker({element:dot}).setLngLat(RUN.geo[RUN.geo.length-1]).addTo(_liveMap);
    _liveMap.resize();
  }catch(e){} });
  setTimeout(()=>{try{_liveMap.resize();}catch(e){}},300);
}
function fmtClock(sec){ sec=Math.round(sec); const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }
function runCtrls2(){ return RUN.paused
  ? `<button class="btn" style="flex:1" onclick="togglePause()">▶ 재개</button>
     <button class="btn" style="flex:1;background:#1a1d23" onclick="stopRun()">🏁 종료</button>`
  : `<button class="btn" style="flex:1" onclick="togglePause()">❚❚ 일시정지</button>`; }
// 지도 모드 하단 카드
function runCardHTML(){ const paused=RUN.paused;
  const header = paused

  return `<div style="background:var(--card);border-radius:18px 18px 0 0;overflow:hidden;box-shadow:0 -6px 20px rgba(0,0,0,.14)">

      <div style="flex:1;text-align:center"><div id="rPace" style="font-size:20px;font-weight:800">${pace(RUN.dist,RUN.elapsed)}</div><div class="muted">페이스</div></div>
      <div style="flex:1;text-align:center"><div id="rHr" style="font-size:20px;font-weight:800;color:#e0245e">${Math.round(RUN.hr)}</div><div class="muted">심박</div></div>
    </div>

function layoutRun(){
  const ov=document.getElementById('ovRun'); if(!ov)return;

      : `<div style="text-align:center;padding:28px 0 4px"><div class="live"><span class="rec-dot"></span>측정 중</div>

      <button onclick="setRunView('map')" title="지도 보기" style="position:absolute;right:16px;top:16px;z-index:600;width:40px;height:40px;border-radius:50%;background:var(--card);color:var(--ink);box-shadow:0 2px 8px rgba(0,0,0,.14);font-size:15px">⤢</button>

          <div style="display:flex;gap:50px;margin-top:44px">

            <div style="text-align:center"><div id="rHr" style="font-size:30px;font-weight:800;color:#e0245e">${Math.round(RUN.hr)}</div><div class="muted">심박 ❤</div></div>

function renderRunning(){
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='ovRun'; ov.style.padding='0';
  $('#phone').appendChild(ov); layoutRun();
}
function setRunView(v){ RUN.view=v; layoutRun(); }
function minimizeRun(){ const ov=document.getElementById('ovRun'); if(ov)ov.style.display='none'; showRunMini(); }
function showRunMini(){ if(document.getElementById('runMini'))return;
  const b=document.createElement('div'); b.id='runMini'; b.onclick=reopenRun;
  b.style.cssText='position:absolute;left:0;right:0;bottom:74px;z-index:900;background:var(--brand);color:#fff;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;box-shadow:0 -4px 14px rgba(0,0,0,.22);font-size:13px';
  b.innerHTML=`<span><span class="rec-dot" style="background:#fff"></span> <b id="rmState">측정 중</b> · <span id="rmTime">0:00</span> · <span id="rmDist">0.00</span>km</span><span style="font-weight:700">탭하여 돌아가기 ›</span>`;

function reopenRun(){ const m=document.getElementById('runMini'); if(m)m.remove();

function updateRunning(){
  const set=(id,v)=>{const e=document.getElementById(id); if(e)e.textContent=v;};

  const rms=document.getElementById('rmState'); if(rms)rms.textContent=RUN.paused?'일시정지됨':'측정 중';
  if(_liveMap){ try{ const src=_liveMap.getSource('live'); if(src){ src.setData(lineFeature(RUN.geo));
    const last=RUN.geo[RUN.geo.length-1]; if(_liveMarker)_liveMarker.setLngLat(last); if(!RUN.paused)_liveMap.setCenter(last); } }catch(e){} }

function togglePause(){ RUN.paused=!RUN.paused;
  if(RUN.view==='map'){ const c=document.getElementById('runCard'); if(c)c.innerHTML=runCardHTML();

function stopRun(){

function openSummary(r){

function commitRun(r){

//==================== 공유 (SVG 템플릿 + Share to) ====================
// ▼▼▼ 직접 만든 템플릿을 여기에 추가하세요 ▼▼▼
//  · SVG는 viewBox="0 0 600 800"(세로형)로 디자인하고 배경은 투명하게 두세요.
//  · 아래 자리표시자를 넣으면 기록값으로 자동 치환됩니다:
//      {{distance}} 거리(km)  {{pace}} 평균 페이스  {{time}} 시간
//      {{hr}} 평균 심박  {{cal}} 칼로리  {{date}} 날짜
//  · 경로(러닝 라인)는 "정사각형 슬롯" 안에 그려집니다. 템플릿에 이 사각형을 두세요:

function routePathSVG(run,bx,by,bw,bh,color,lw){

  const minx=Math.min(...xs),maxx=Math.max(...xs),miny=Math.min(...ys),maxy=Math.max(...ys);
  const w=(maxx-minx)||1,h=(maxy-miny)||1, sc=Math.min(bw/w,bh/h);
  const ox=bx+(bw-w*sc)/2, oy=by+(bh-h*sc)/2;

}
function fillTemplate(svg,r){

  img.onload=()=>{ const c=document.createElement('canvas'); c.width=600;c.height=800;

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function paceFromSec(sec){const m=Math.floor(sec/60),s=Math.round(sec%60);return `${m}'${String(s).padStart(2,'0')}"`;}
function detailData(r){
  const rnd=mulberry32((r.id%2147480000)||12345);
  const dist=r.dist, dur=r.dur, avg=dur/dist;
  // 구간(km splits)
  const full=Math.floor(dist); const splits=[]; let hr=Math.max(120,r.hr-25);
  for(let k=1;k<=full;k++){ const ps=Math.max(270,avg+(rnd()-0.5)*40);
    hr=Math.min(190,hr+3.5+(rnd()-0.4)*6); splits.push({label:''+k,paceSec:ps,elev:Math.round((rnd()-0.5)*4),hr:Math.round(hr)});}
  const rem=+(dist-full).toFixed(2);
  if(rem>0.05){ hr=Math.min(192,hr+2.5); splits.push({label:rem.toFixed(1),paceSec:Math.max(270,avg+(rnd()-0.5)*40),elev:Math.round((rnd()-0.5)*4),hr:Math.round(hr),partial:true});}
  // 시계열 (차트용)
  const N=60, paceS=[],hrS=[],elevS=[],powS=[]; let e=10;
  for(let i=0;i<N;i++){ const t=i/(N-1);
    paceS.push(avg+(rnd()-0.5)*95);
    hrS.push(Math.min(190,(r.hr-16)+t*30+(rnd()-0.5)*10));
    e=Math.max(2,12-t*4+(rnd()-0.5)*1.6); elevS.push(e);
    powS.push(Math.max(80,255+(rnd()-0.5)*120-(t>0.5?(t-0.5)*120:0)));}
  let gain=0; for(let i=1;i<N;i++){const d=elevS[i]-elevS[i-1]; if(d>0)gain+=d;}
  const avgPow=Math.round(powS.reduce((a,v)=>a+v,0)/N);
  return {dist,dur,avg,splits,paceS,hrS,elevS,powS,
    maxHr:Math.round(Math.max(...hrS)), avgHr:r.hr,
    fastest:Math.min(...splits.map(s=>s.paceSec)),
    elapsed:dur+Math.round(rnd()*30+4),
    elevGain:Math.round(gain), maxElev:Math.round(Math.max(...elevS))+6,
    avgPow, maxPow:Math.round(Math.max(...powS)), work:Math.round(avgPow*dur/1000)};
}

  map.on('load',()=>{ try{
    map.addSource('rt',{type:'geojson',data:{type:'Feature',geometry:{type:'LineString',coordinates:route}}});
    map.addLayer({id:'rtl',type:'line',source:'rt',layout:{'line-cap':'round','line-join':'round'},
      paint:{'line-color':'#ff5a3c','line-width':interactive?5:3}});
    map.fitBounds(routeBounds(route),{padding:interactive?40:10,animate:false,maxZoom:16});
    if(interactive){ const mk=(ll,c)=>{const dd=document.createElement('div');
      dd.style.cssText=`width:15px;height:15px;border-radius:50%;background:${c};border:3px solid #fff;box-shadow:0 0 0 2px rgba(0,0,0,.18)`;
      new maplibregl.Marker({element:dd}).setLngLat(ll).addTo(map);};
      mk(route[0],'#16a34a'); mk(route[route.length-1],'#1a1d23'); }
    map.resize();
  }catch(e){} });
  setTimeout(()=>{try{map.resize();}catch(e){}},250);
  return map;
}
function metricGrid(items){return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px 12px">`+
  items.map(([l,v,c])=>`<div><div class="muted">${l}</div><div style="font-size:20px;font-weight:800;${c?`color:${c}`:''}">${v}</div></div>`).join('')+`</div>`;}
function chartBlock(title,svg,rows){return `<div class="card"><b style="font-size:15px">${title}</b>
  <div style="margin:10px 0">${svg}</div>${rows.map(([l,v])=>`<div class="row" style="padding:6px 0;border-top:1px solid var(--line)"><span class="muted">${l}</span><b>${v}</b></div>`).join('')}</div>`;}

function openDetail(runId){
  const r=S.runs.find(x=>x.id===runId); if(!r)return;
  const d=detailData(r); const sh=shoe(r.shoeId);
  const dt=new Date(r.date); const hour=8;
  const title=(hour<12?'아침 러닝':hour<18?'오후 러닝':'저녁 러닝');
  const splitRows=()=>{ const maxSp=Math.max(...d.splits.map(s=>1/s.paceSec));
    return d.splits.map(s=>{const bw=(1/s.paceSec)/maxSp*100;
      return `<div style="display:flex;align-items:center;gap:8px;font-size:12px;padding:5px 0">
        <span style="width:26px;color:var(--sub)">${s.label}</span>
        <span style="width:46px;font-weight:700">${paceFromSec(s.paceSec)}</span>
        <span style="flex:1"><i style="display:block;height:14px;border-radius:3px;background:#2f6df6;width:${bw.toFixed(0)}%"></i></span>
        <span style="width:30px;text-align:right;color:var(--sub)">${s.elev>0?'+':''}${s.elev}</span>
        <span style="width:40px;text-align:right;color:#e0245e">${s.hr}</span></div>`;}).join('');};
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='ovDetail';
  ov.innerHTML=`
    <div class="topbar"><button class="x" onclick="document.getElementById('ovDetail').remove()">‹</button>
      <b style="flex:1">기록 상세</b>
      <button class="x" onclick="openShare(${r.id})" title="공유">⬆</button></div>
    ${(typeof maplibregl!=='undefined')?'<div id="detmap" style="flex:none;height:240px;width:100%;border-radius:14px;overflow:hidden;background:#e9eef2"></div>':routeSVG(r)}
    <h1 style="margin:16px 0 2px">${title}</h1>
    <div class="muted">👟 ${dt.getMonth()+1}월 ${dt.getDate()}일 · 오전 8:33 · 시뮬레이션 경로</div>
    <div class="card" style="margin-top:14px">${metricGrid([
      ['거리',r.dist.toFixed(2)+' km'],['평균 페이스',pace(r.dist,r.dur)+' /km'],
      ['이동 시간',fmtDur(r.dur)],['고도 상승',d.elevGain+' m'],
      ['칼로리',r.cal+' Cal'],['평균 심박',r.hr+' bpm','#e0245e']])}</div>

    <div class="card"><b style="font-size:15px">구간 (Splits)</b>
      <div style="display:flex;gap:8px;font-size:11px;color:var(--sub);margin-top:8px">
        <span style="width:26px">Km</span><span style="width:46px">페이스</span>
        <span style="flex:1"></span><span style="width:30px;text-align:right">고도</span><span style="width:40px;text-align:right">심박</span></div>
      <div style="margin-top:2px">${splitRows()}</div></div>

    ${chartBlock('페이스 (Pace)', svgArea(d.paceS,'#2f6df6',true), [
      ['평균 페이스',pace(r.dist,r.dur)+' /km'],['이동 시간',fmtDur(r.dur)],
      ['경과 시간',fmtDur(d.elapsed)],['최고 구간',paceFromSec(d.fastest)+' /km']])}

    ${chartBlock('심박수 (Heart Rate)', svgArea(d.hrS,'#e0245e',false), [
      ['평균 심박',d.avgHr+' bpm'],['최대 심박',d.maxHr+' bpm']])}

    ${chartBlock('파워 (Power)', svgArea(d.powS,'#a855f7',false), [
      ['평균 파워',d.avgPow+' W'],['총 일량',d.work+' kJ'],['최대 파워',d.maxPow+' W']])}

    ${chartBlock('고도 (Elevation)', svgArea(d.elevS,'#9aa0ab',false), [
      ['고도 상승',d.elevGain+' m'],['최고 고도',d.maxElev+' m']])}

    <div class="card"><div class="row"><span class="muted">👟 신발</span><b>${sh?sh.name:'-'}</b></div>
      <div class="row" style="margin-top:8px"><span class="muted">기록 방식</span><b>시뮬레이션 데이터</b></div></div>
    <div class="note">심박·파워·고도·구간 데이터는 데모용 시뮬레이션 값입니다. 실제 측정에는 GPS·심박 센서(워치 등)가 필요합니다.</div>
    <button class="btn" style="margin-top:12px" onclick="openShare(${r.id})">공유</button>`;
  $('#phone').appendChild(ov);
  ov.scrollTop=0;
  if(typeof maplibregl!=='undefined') setTimeout(()=>drawRouteMap('detmap',r,true),0);
}

//==================== 신발 추가/관리 ====================
const BRANDS={
  '나이키':['페가수스 40','보메로 17','인피니티 런 4'],
  '아디다스':['울트라부스트','아디제로','슈퍼노바'],
  '아식스':['카야노 31','님버스 26','GT-2000'],
  '호카':['클리프톤 9','본디 8','마하 6'],
  '뉴발란스':['1080v13','880v14','페이서'],
  '브룩스':['고스트 16','글리세린 21','아드레날린'],
};
function openShoeAdd(){
  let brand='나이키';
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='ovShoe';
  const draw=()=>{ ov.querySelector('#models').innerHTML=
      BRANDS[brand].map(m=>`<div class="card" style="margin-bottom:8px" onclick="addShoe('${brand} ${m}',600,readStartKm())">
        <div class="row"><span>${m}</span><span class="brand" style="font-weight:700">선택</span></div></div>`).join('');
    ov.querySelectorAll('#brands .chip').forEach(c=>c.classList.toggle('on',c.dataset.b===brand)); };
  ov.innerHTML=`
    <div class="topbar"><button class="x" onclick="document.getElementById('ovShoe').remove()">✕</button><b>신발 추가</b></div>
    <div class="card"><div class="row"><span class="muted">이미 뛴 거리 <span style="font-size:11px">(이전에 신던 신발이면 입력)</span></span>
      <span style="white-space:nowrap"><input id="startKm" type="number" min="0" step="1" value="0"
        style="width:64px;padding:8px;border:1px solid var(--line);border-radius:8px;font-size:14px;text-align:right"> km</span></div></div>
    <div class="muted" style="margin-bottom:6px">1. 브랜드 선택</div>
    <div id="brands">${Object.keys(BRANDS).map(b=>`<button class="chip" data-b="${b}" onclick="window._pickBrand('${b}')">${b}</button>`).join('')}</div>
    <div class="muted" style="margin:14px 0 6px">2. 모델 선택</div>
    <div id="models"></div>
    <div class="card" style="border:1.5px dashed var(--brand);background:#fff0ec;text-align:center" onclick="addShoeManual()">
      <b class="brand">+ 목록에 없어요 (직접 입력)</b>
      <div class="muted" style="margin-top:4px">신발 이름·목표 수명(km)을 직접 등록</div></div>
    <div class="note">제품 이미지는 저작권 문제로 사용하지 않고, 브랜드·모델명 텍스트만 등록합니다.</div>`;
  $('#phone').appendChild(ov);
  window._pickBrand=(b)=>{brand=b;draw();};
  draw();
}
function readStartKm(){ const el=document.getElementById('startKm'); return el?Math.max(0,parseFloat(el.value)||0):0; }
function addShoe(name,max=600,startKm=0){
  S.shoes.push({id:Date.now(),name,km:Math.max(0,startKm),count:0,max}); save();
  const ov=$('#ovShoe'); if(ov)ov.remove(); go('shoe'); toast('신발을 추가했어요');
}
function addShoeManual(){
  const name=prompt('신발 이름을 입력하세요 (예: 나이키 인빈서블 3)'); if(!name)return;
  const max=parseInt(prompt('목표 수명(km)을 입력하세요','600'),10)||600;
  addShoe(name.trim(),max,readStartKm());
}
function setDefaultShoe(id){ S.defaultShoe=id; save(); render(); toast('기본 신발로 설정했어요'); }
function openShoePicker(){
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='ovPicker';
  ov.style.background='rgba(0,0,0,0.4)'; ov.style.justifyContent='flex-end'; ov.style.padding='0';
  ov.onclick=(e)=>{ if(e.target===ov) ov.remove(); };
  ov.innerHTML=`<div style="background:#fff;border-radius:20px 20px 0 0;padding:18px 16px 24px;max-height:72%;overflow:auto">
    <div class="row" style="margin-bottom:12px"><b>신을 신발 선택</b>
      <button class="x" onclick="document.getElementById('ovPicker').remove()">✕</button></div>
    ${S.shoes.map(s=>`<div class="card" style="${S.defaultShoe===s.id?'border-color:var(--brand);background:#fff0ec':''}" onclick="pickRunShoe(${s.id})">
      <div class="row"><span><span class="shoe-emoji">👟</span><b>${s.name}</b></span>
        ${S.defaultShoe===s.id?'<span class="brand" style="font-weight:700">✓ 현재</span>':''}</div>
      <div class="muted" style="margin-top:4px">${s.km.toFixed(0)}km · ${s.count}회</div></div>`).join('')}
    <button class="btn ghost" onclick="document.getElementById('ovPicker').remove();openShoeAdd()">+ 새 신발 등록</button></div>`;
  $('#phone').appendChild(ov);
}
function pickRunShoe(id){ S.defaultShoe=id; save(); const ov=$('#ovPicker'); if(ov)ov.remove(); render(); const s=shoe(id); toast((s?s.name:'신발')+' 선택'); }
function delShoe(id){ if(!confirm('이 신발을 삭제할까요? (기록은 유지됩니다)'))return;
  S.shoes=S.shoes.filter(s=>s.id!==id); if(S.defaultShoe===id)S.defaultShoe=S.shoes[0]?.id; save(); render(); toast('삭제했어요'); }
function editShoe(id){ const s=shoe(id); if(!s)return;
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='ovEdit';
  ov.style.background='rgba(0,0,0,0.4)'; ov.style.justifyContent='flex-end'; ov.style.padding='0';
  ov.onclick=(e)=>{ if(e.target===ov) ov.remove(); };
  const inp='style="width:74px;padding:8px;border:1px solid var(--line);border-radius:8px;font-size:14px;text-align:right"';
  ov.innerHTML=`<div style="background:#fff;border-radius:20px 20px 0 0;padding:18px 16px 24px;max-height:82%;overflow:auto">
    <div class="row" style="margin-bottom:12px"><b>신발 수정</b><button class="x" onclick="document.getElementById('ovEdit').remove()">✕</button></div>
    <div class="card"><div class="muted" style="margin-bottom:6px">신발 이름</div>
      <input id="eName" type="text" value="${s.name.replace(/"/g,'&quot;')}" style="width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;font-size:14px"></div>
    <div class="card"><div class="row"><span class="muted">누적 거리</span><span><input id="eKm" type="number" min="0" step="1" value="${s.km.toFixed(0)}" ${inp}> km</span></div></div>
    <div class="card"><div class="row"><span class="muted">누적 횟수</span><span><input id="eCnt" type="number" min="0" step="1" value="${s.count}" ${inp}> 회</span></div></div>
    <div class="card"><div class="row"><span class="muted">목표 수명</span><span><input id="eMax" type="number" min="50" step="50" value="${s.max}" ${inp}> km</span></div></div>
    <button class="btn" onclick="saveShoeEdit(${id})">저장</button></div>`;
  $('#phone').appendChild(ov);
}
function saveShoeEdit(id){ const s=shoe(id); if(!s)return;
  const name=(document.getElementById('eName').value||'').trim(); if(name)s.name=name;
  s.km=Math.max(0,parseFloat(document.getElementById('eKm').value)||0);
  s.count=Math.max(0,parseInt(document.getElementById('eCnt').value,10)||0);
  s.max=Math.max(50,parseInt(document.getElementById('eMax').value,10)||s.max);
  save(); const ov=$('#ovEdit'); if(ov)ov.remove(); render(); toast('수정했어요');
}

function resetAll(){ if(confirm('모든 데이터를 초기 샘플로 되돌릴까요?')){ S=structuredClone(DEFAULT); save(); render(); toast('샘플 데이터로 초기화했어요'); } }

//==================== 시작 ====================
render();
</script>
</body>
</html>
